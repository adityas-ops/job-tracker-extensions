<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>JobLog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #14151A;
      color: #EDEDED;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo { color: #6C7BFF; font-size: 18px; }
    h1 { font-size: 14px; font-weight: 700; }
    .subtitle { font-size: 11px; color: #9A9AA5; margin-top: 1px; }
    label {
      display: block;
      font-size: 11px;
      color: #9A9AA5;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 7px 9px;
      border-radius: 6px;
      border: 1px solid #2C2D35;
      background: #1D1E24;
      color: #EDEDED;
      font-size: 13px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #6C7BFF;
    }
    .btn-primary {
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      border: none;
      border-radius: 7px;
      background: #6C7BFF;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: #5A69EE; }
    .divider {
      border: none;
      border-top: 1px solid #2C2D35;
      margin: 14px 0;
    }
    .dashboard-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px;
      border: 1px solid #2C2D35;
      border-radius: 7px;
      background: transparent;
      color: #9A9AA5;
      font-size: 12px;
      cursor: pointer;
    }
    .dashboard-btn:hover { border-color: #6C7BFF; color: #6C7BFF; }
    .confirm { font-size: 12px; color: #6FCF97; margin-top: 8px; display: none; text-align:center; }
    .note {
      font-size: 11px;
      color: #9A9AA5;
      background: #1D1E24;
      border: 1px solid #2C2D35;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 4px;
      line-height: 1.5;
    }
    .dot { width:7px;height:7px;border-radius:50%;background:#6FCF97;display:inline-block;margin-right:4px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">◆</span>
    <div>
      <h1>JobLog</h1>
      <div class="subtitle">Application Tracker</div>
    </div>
  </div>

  <div class="note">
    <span class="dot"></span>
    Auto-detects applications on LinkedIn, Indeed, Naukri, Glassdoor & Hirist.
    Use the form below for other sites.
  </div>

  <label>Company</label>
  <input type="text" id="company" placeholder="e.g. Infosys" />

  <label>Job title</label>
  <input type="text" id="title" placeholder="e.g. Software Engineer" />

  <label>Source</label>
  <select id="source">
    <option>Company site</option>
    <option>LinkedIn</option>
    <option>Indeed</option>
    <option>Naukri</option>
    <option>Glassdoor</option>
    <option>Hirist</option>
    <option>Internshala</option>
    <option>AngelList / Wellfound</option>
    <option>Other</option>
  </select>

  <label>Date applied</label>
  <input type="date" id="date" />

  <button class="btn-primary" id="save">Save application</button>
  <div class="confirm" id="confirm">Saved successfully ✓</div>

  <hr class="divider" />
  <button class="dashboard-btn" id="openDashboard">📊 Open dashboard</button>

  <script src="popup.js"></script>
</body>
</html>
