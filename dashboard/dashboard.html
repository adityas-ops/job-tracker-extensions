<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Job Application Tracker</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="brand-mark">◆</span>
        <div>
          <h1>Application Log</h1>
          <p class="subtitle">Every application, in one place.</p>
        </div>
      </div>
      <button id="exportBtn" class="btn-secondary">Export PDF</button>
    </header>

    <section class="stats">
      <div class="stat-card">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">Applications shown</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statWeek">0</span>
        <span class="stat-label">This week</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statMonth">0</span>
        <span class="stat-label">This month</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="statResponse">0%</span>
        <span class="stat-label">Response rate</span>
      </div>
    </section>

    <section class="controls">
      <div class="control-group">
        <label>Range</label>
        <select id="rangeFilter">
          <option value="all">All time</option>
          <option value="day">Today</option>
          <option value="week">This week</option>
          <option value="month">This month</option>
          <option value="year">This year</option>
        </select>
      </div>
      <div class="control-group">
        <label>Source</label>
        <select id="sourceFilter">
          <option value="all">All sources</option>
        </select>
      </div>
      <div class="control-group">
        <label>Company</label>
        <input type="text" id="companyFilter" placeholder="Filter by company..." />
      </div>
      <div class="control-group grow"></div>
      <button id="addBtn" class="btn-primary">+ Add application</button>
    </section>

    <section class="table-section">
      <table id="appTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Company</th>
            <th>Role</th>
            <th>Source</th>
            <th>Status</th>
            <th>Heard back</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">
        <p>No applications match these filters yet.</p>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2 id="modalTitle">Add application</h2>
      <label>Company</label>
      <input type="text" id="mCompany" />
      <label>Job title</label>
      <input type="text" id="mTitle" />
      <label>Source</label>
      <select id="mSource">
        <option>LinkedIn</option>
        <option>Indeed</option>
        <option>Naukri</option>
        <option>Glassdoor</option>
        <option>Company site</option>
        <option>Other</option>
      </select>
      <label>Date applied</label>
      <input type="date" id="mDate" />
      <label>Status</label>
      <select id="mStatus">
        <option>Applied</option>
        <option>Interviewing</option>
        <option>Offer</option>
        <option>Rejected</option>
        <option>Ghosted</option>
      </select>
      <label class="checkbox-row">
        <input type="checkbox" id="mHeardBack" />
        <span>Heard back from company</span>
      </label>
      <div class="modal-actions">
        <button id="modalCancel" class="btn-secondary">Cancel</button>
        <button id="modalSave" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
